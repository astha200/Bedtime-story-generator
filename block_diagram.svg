<svg xmlns="http://www.w3.org/2000/svg" width="920" height="900" viewBox="0 0 920 900" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
    <marker id="arrowLoop" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#b45309"/>
    </marker>
    <marker id="arrowFb" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#0e7490"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="920" height="900" fill="#ffffff"/>
  <text x="460" y="34" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">Bedtime Story Generator — System Flow</text>
  <text x="460" y="54" text-anchor="middle" font-size="12" fill="#64748b">generator / critic loop: classify → plan → write → judge → refine</text>

  <!-- ===== main vertical spine arrows ===== -->
  <g stroke="#475569" stroke-width="1.6" fill="none" marker-end="url(#arrow)">
    <line x1="460" y1="112" x2="460" y2="150"/>
    <line x1="460" y1="206" x2="460" y2="244"/>
    <line x1="460" y1="300" x2="460" y2="338"/>
    <line x1="460" y1="394" x2="460" y2="432"/>
    <line x1="460" y1="488" x2="460" y2="526"/>
    <line x1="460" y1="582" x2="460" y2="620"/>
    <line x1="460" y1="676" x2="460" y2="714"/>
  </g>
  <g font-size="11" fill="#475569" text-anchor="start">
    <text x="470" y="136">story request</text>
    <text x="470" y="230">safe</text>
    <text x="470" y="324">categories + must-include</text>
    <text x="470" y="418">5-beat bedtime arc</text>
    <text x="470" y="512">draft</text>
    <text x="470" y="606">+ measured reading grade</text>
    <text x="470" y="700">scores + feedback</text>
  </g>

  <!-- ===== nodes ===== -->
  <!-- User -->
  <rect x="330" y="66" width="260" height="46" rx="23" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="460" y="94" text-anchor="middle" font-size="14" font-weight="600" fill="#1e3a8a">User (parent / child)</text>

  <!-- Safety gate -->
  <rect x="330" y="152" width="260" height="54" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="460" y="174" text-anchor="middle" font-size="13.5" font-weight="600" fill="#991b1b">Safety / Guardrail gate</text>
  <text x="460" y="192" text-anchor="middle" font-size="11" fill="#b91c1c">block unsafe requests before any generation</text>

  <!-- Classifier -->
  <rect x="330" y="246" width="260" height="54" rx="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="460" y="268" text-anchor="middle" font-size="13.5" font-weight="600" fill="#5b21b6">Classifier</text>
  <text x="460" y="286" text-anchor="middle" font-size="11" fill="#6d28d9">multi-label categories + must_include</text>

  <!-- Planner -->
  <rect x="330" y="340" width="260" height="54" rx="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="460" y="362" text-anchor="middle" font-size="13.5" font-weight="600" fill="#5b21b6">Story Planner</text>
  <text x="460" y="380" text-anchor="middle" font-size="11" fill="#6d28d9">arc that winds DOWN toward sleep</text>

  <!-- Storyteller -->
  <rect x="330" y="434" width="260" height="54" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="460" y="456" text-anchor="middle" font-size="13.5" font-weight="600" fill="#166534">Storyteller (LLM)</text>
  <text x="460" y="474" text-anchor="middle" font-size="11" fill="#15803d">category-blended, read-aloud voice</text>

  <!-- Readability -->
  <rect x="330" y="528" width="260" height="54" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="460" y="550" text-anchor="middle" font-size="13.5" font-weight="600" fill="#334155">Readability check</text>
  <text x="460" y="568" text-anchor="middle" font-size="11" fill="#475569">deterministic Flesch-Kincaid (free, pre-judge)</text>

  <!-- Judge -->
  <rect x="330" y="622" width="260" height="54" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="460" y="644" text-anchor="middle" font-size="13.5" font-weight="600" fill="#92400e">LLM Judge (critic)</text>
  <text x="460" y="662" text-anchor="middle" font-size="11" fill="#b45309">score-anchored rubric → JSON, temp 0</text>

  <!-- Decision -->
  <rect x="330" y="716" width="260" height="54" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="460" y="738" text-anchor="middle" font-size="13.5" font-weight="600" fill="#92400e">Pass? best-draft + safety floor</text>
  <text x="460" y="756" text-anchor="middle" font-size="11" fill="#b45309">keep best safe draft; fail closed if none</text>

  <!-- Final -->
  <rect x="330" y="810" width="260" height="54" rx="8" fill="#cffafe" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="460" y="832" text-anchor="middle" font-size="13.5" font-weight="600" fill="#155e75">Final story + parent card</text>
  <text x="460" y="850" text-anchor="middle" font-size="11" fill="#0e7490">reading level · read-time · lesson · refrain</text>

  <!-- ===== safety reject branch (right) ===== -->
  <path d="M590 179 H720 V89 H590" stroke="#ef4444" stroke-width="1.6" fill="none" marker-end="url(#arrow)"/>
  <rect x="700" y="152" width="150" height="54" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="1.3"/>
  <text x="775" y="174" text-anchor="middle" font-size="12" font-weight="600" fill="#991b1b">Redirect</text>
  <text x="775" y="191" text-anchor="middle" font-size="10.5" fill="#b91c1c">"pick a cozier idea"</text>
  <text x="628" y="150" font-size="11" fill="#ef4444">unsafe</text>

  <!-- ===== refine loop (left, judge → storyteller) ===== -->
  <path d="M330 743 H250 V461 H330" stroke="#b45309" stroke-width="1.8" fill="none" marker-end="url(#arrowLoop)"/>
  <text x="150" y="600" font-size="11.5" font-weight="600" fill="#b45309" text-anchor="middle">refine loop</text>
  <text x="150" y="616" font-size="10.5" fill="#b45309" text-anchor="middle">below bar →</text>
  <text x="150" y="630" font-size="10.5" fill="#b45309" text-anchor="middle">revise w/ feedback</text>

  <!-- ===== user feedback loop (far left, final → storyteller) ===== -->
  <path d="M330 837 H120 V461 H330" stroke="#0e7490" stroke-width="1.8" fill="none" marker-end="url(#arrowFb)"/>
  <text x="95" y="640" font-size="11.5" font-weight="600" fill="#0e7490" text-anchor="middle" transform="rotate(-90 95 640)">user feedback: "make it funnier" / "shorter"</text>

  <!-- ===== legend ===== -->
  <g font-size="11" fill="#334155">
    <rect x="640" y="250" width="230" height="150" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="655" y="270" font-weight="700" fill="#0f172a">Legend</text>
    <rect x="655" y="282" width="14" height="12" rx="3" fill="#dcfce7" stroke="#22c55e"/>
    <text x="676" y="292">LLM writer</text>
    <rect x="655" y="302" width="14" height="12" rx="3" fill="#fef3c7" stroke="#f59e0b"/>
    <text x="676" y="312">LLM judge / decision</text>
    <rect x="655" y="322" width="14" height="12" rx="3" fill="#f1f5f9" stroke="#94a3b8"/>
    <text x="676" y="332">deterministic check</text>
    <rect x="655" y="342" width="14" height="12" rx="3" fill="#ede9fe" stroke="#8b5cf6"/>
    <text x="676" y="352">LLM setup (classify/plan)</text>
    <rect x="655" y="362" width="14" height="12" rx="3" fill="#fee2e2" stroke="#ef4444"/>
    <text x="676" y="372">safety gate</text>
    <rect x="655" y="382" width="14" height="12" rx="3" fill="#cffafe" stroke="#06b6d4"/>
    <text x="676" y="392">output to user</text>
  </g>
</svg>
